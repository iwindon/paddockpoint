name: Update Weather Data

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch data from Ambient Weather
        env:
          AMBIENT_APPLICATION_KEY: ${{ secrets.AMBIENT_APPLICATION_KEY }}
          AMBIENT_API_KEY: ${{ secrets.AMBIENT_API_KEY }}
          AMBIENT_DEVICE_MAC: ${{ secrets.AMBIENT_DEVICE_MAC }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone

          app_key = os.environ.get("AMBIENT_APPLICATION_KEY", "").strip()
          api_key = os.environ.get("AMBIENT_API_KEY", "").strip()
          device_mac = os.environ.get("AMBIENT_DEVICE_MAC", "").strip()

          if not app_key or not api_key:
              print("Missing required secrets: AMBIENT_APPLICATION_KEY and/or AMBIENT_API_KEY")
              raise SystemExit(0)

          def first_non_none(*values):
              for value in values:
                  if value is not None:
                      return value
              return None

          def parse_numeric(value):
              if value is None:
                  return None
              if isinstance(value, (int, float)):
                  return value
              if isinstance(value, str):
                  cleaned = "".join(ch for ch in value if ch.isdigit() or ch in ".+-")
                  if not cleaned:
                      return None
                  try:
                      return float(cleaned)
                  except ValueError:
                      return None
              return None

          def extract_soil_values(last_data):
              soil_values = {}
              for key, value in last_data.items():
                  key_l = key.lower()
                  if key_l.startswith("soilmoisture") or key_l.startswith("soilhumidity") or key_l.startswith("soilhum"):
                      parsed = parse_numeric(value)
                      if parsed is not None:
                          soil_values[key_l] = parsed
              return soil_values

          def pick_soil_moisture(last_data):
              soil_values = extract_soil_values(last_data)

              # Prefer channel 3 when present (app label: Soil 3).
              soil3 = first_non_none(
                  soil_values.get("soilmoisture3"),
                  soil_values.get("soilhumidity3"),
                  soil_values.get("soilhum3"),
                  parse_numeric(last_data.get("soil3")),
              )
              if soil3 is not None:
                  return soil3

              priority_keys = [
                  "soilmoisture",
                  "soilmoisture1",
                  "soilmoisture2",
                  "soilmoisture3",
                  "soilmoisture4",
                  "soilhumidity",
                  "soilhumidity1",
                  "soilhumidity2",
                  "soilhumidity3",
                  "soilhumidity4",
                  "soilhum",
                  "soilhum1",
                  "soilhum2",
                  "soilhum3",
                  "soilhum4",
                  "soil3",
              ]

              for key in priority_keys:
                  value = parse_numeric(last_data.get(key))
                  if value is not None:
                      return value

              dynamic_keys = sorted(soil_values.keys())
              for key in dynamic_keys:
                  value = soil_values.get(key)
                  if value is not None:
                      return value

              return None

          params = {
              "applicationKey": app_key,
              "apiKey": api_key,
          }
          if device_mac:
              params["macAddress"] = device_mac

          url = "https://api.ambientweather.net/v1/devices?" + urllib.parse.urlencode(params)
          try:
              with urllib.request.urlopen(url, timeout=30) as response:
                  payload = json.loads(response.read().decode("utf-8"))
          except (urllib.error.URLError, TimeoutError, ValueError) as exc:
              print("Ambient fetch skipped due to transient error: " + str(exc))
              raise SystemExit(0)

          if not isinstance(payload, list) or not payload:
              print("Ambient API returned no devices; keeping existing weather-data.json")
              raise SystemExit(0)

          device = payload[0]
          if device_mac:
              for candidate in payload:
                  mac = (candidate.get("macAddress") or "").lower()
                  if mac == device_mac.lower():
                      device = candidate
                      break

          last_data = device.get("lastData") or {}
          station_name = (device.get("info") or {}).get("name")

          try:
              tempf = last_data.get("tempf")
              humidity = last_data.get("humidity")
              windspeedmph = first_non_none(last_data.get("windspeedmph"), last_data.get("windspeedmph_avg10m"))
              dailyrainin = last_data.get("dailyrainin")
              monthlyrainin = last_data.get("monthlyrainin")
              uv = first_non_none(last_data.get("uv"), last_data.get("uvi"))
              soil_values = extract_soil_values(last_data)
              soilmoisture = pick_soil_moisture(last_data)
              baromrelin = first_non_none(last_data.get("baromrelin"), last_data.get("baromabsin"))
              last_updated = first_non_none(last_data.get("dateutc"), last_data.get("date"))
          except Exception as exc:
              print("Ambient payload parse skipped due to unexpected structure: " + str(exc))
              raise SystemExit(0)

          if all(value is None for value in [tempf, humidity, windspeedmph, dailyrainin, monthlyrainin, uv, soilmoisture, baromrelin, last_updated]):
              keys = sorted(last_data.keys())
              print("Ambient response had no mapped weather fields; keys present: " + ",".join(keys))
              raise SystemExit(0)

          output = {
              "source": "ambient-weather-network",
              "generatedAt": datetime.now(timezone.utc).isoformat(),
              "weather": {
                  "stationName": station_name,
                  "tempf": tempf,
                  "humidity": humidity,
                  "windspeedmph": windspeedmph,
                  "dailyrainin": dailyrainin,
                  "monthlyrainin": monthlyrainin,
                  "uv": uv,
                  "soilmoisture": soilmoisture,
                  "soilmoisture3": first_non_none(
                      soil_values.get("soilmoisture3"),
                      soil_values.get("soilhumidity3"),
                      soil_values.get("soilhum3"),
                      parse_numeric(last_data.get("soil3")),
                  ),
                  "soilhumidity3": soil_values.get("soilhumidity3"),
                  "soilhum3": soil_values.get("soilhum3"),
                  "soil3": parse_numeric(last_data.get("soil3")),
                  "soilSensors": soil_values,
                  "baromrelin": baromrelin,
                  "lastUpdated": last_updated,
              },
          }

          with open("assets/weather-data.json", "w", encoding="utf-8") as fh:
              json.dump(output, fh, indent=2)
              fh.write("\n")
          PY

      - name: Commit updated weather file
        run: |
          if git diff --quiet assets/weather-data.json; then
            echo "No weather change to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/weather-data.json

          if ! git commit -m "chore: update published weather data"; then
            echo "Nothing to commit after staging"
            exit 0
          fi

          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          if ! git push origin "HEAD:${GITHUB_REF_NAME}"; then
            echo "Push skipped due to branch protection, token scope, or concurrent updates"
            exit 0
          fi
